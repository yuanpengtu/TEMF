defaults:
  - recflow.yaml
  - _self_

name: temf
target: src.training.loss.TEMFLoss

adaptive_loss_weight_eps: 0.001

time_sampling_fm:
  timestep_distrib_type: logit_norm
  scale: 1.0
  location: -0.4
  eps: 0

distrib_t_t_next_mf:
  type: minmax
  time_sampling_mf_t:
    timestep_distrib_type: logit_norm
    scale: 1.0
    location: -0.4
    eps: 0
  time_sampling_mf_t_next:
    timestep_distrib_type: logit_norm
    scale: 1.0
    location: -0.4
    eps: 0

ratio_fm:
  scheduler: constant
  initial_value: 0.75
  end_value: 0.75
  change_init_steps: 0
  change_end_steps: 0
  gamma: 1.0
  clamp_value: 0.0
  up_clamp_value: ~

boundary_ratio:
  scheduler: sigmoid
  initial_value: 0.9
  end_value: 0.1
  change_init_steps: 0
  change_end_steps: ${training.max_steps}
  transition_progress: 0.6
  gamma: 8.0
  clamp_value: 0.0
  up_clamp_value: ~

alpha:
  scheduler: constant
  initial_value: 0.0
  end_value: 0.0
  change_init_steps: 0
  change_end_steps: 0
  gamma: 1.0
  clamp_value: 0.0
  discrete_training: false
  up_clamp_value: ~

cfg_params:
  omega: 1.0
  kappa: 0.0
  guidance_scale: 1.0
  t_min: 0.0
  t_max: 1.0
  mix_schedule:
    mix_ratio:
      scheduler: linear
      initial_value: 0.3
      end_value: 0.1
      change_init_steps: 0
      change_end_steps: ${training.max_steps}
      gamma: 1.0
      clamp_value: 0.0
      up_clamp_value: ~

max_steps: ${training.max_steps}

clamp_utgt: 4.0

temporal_equilibrium:
  lambda1: 1.0
  lambda2: 1.0
  beta1: 1.0
  delta_eps: 0.001
  min_weight: ~
  max_weight: ~
  normalize: false
  normalize_eps: 1.0e-6

fid_tricks:
  use_temf_target: true
  boundary_loss_weight: 1.0
  trajectory_loss_weight: 1.0
  fm_weight: 1.0
  consistency_weight: 1.0
  add_objective_residual: 0.0

alphaflow-256x256-b256-ditb2-sdvae-base-folder:
  model: dit_alphaflow_ldm
  loss: alphaflow
  dataset: imagenet
  sampling: recflow
  env: local
  pre_extract_latents: none
  overrides:
    quiet_launch: true
    num_nodes: 1
    wandb: {tags: ["alphaflow-latentspace"]}
    training:
      metrics: [fid512_full]
      metrics_rare: [fid50k_full]
      fid_statistics_file: ${env.project_path}/data/adm_in256_stats.npz
      metrics_extra_sampling_cfg_overwrites:
        +NFE_2_ode_sampling:
          num_steps: 2
        +NFE_2_consistency_sampling:
          num_steps: 2
          enable_consistency_sampling: true
      max_steps: 400_000
      freqs: {snapshot_latest: 1000, snapshot: 100000, loss_per_sigma: ~, loss_val: ~}
      traj_len_for_vis_gen: 1
      num_vis_samples: 16
      dp: {strategy: ddp}
    sampling:
      num_steps: 1
      sigma_noise: 1.0
      enable_trajectory_sampling: true
      enable_consistency_sampling: false
    dataset:
      name: imagenet_folder
      resolution: [1,256,256]
      batch_gpu: 32
      batch_size: 256
      test_batch_gpu: 1
      use_val_data_for_eval_stream: false
      print_traceback: true
      print_exceptions: true
    model:
      optim:
        class_name: torch.optim.Adam
        betas: [0.9, 0.95]
        weight_decay: 0.0
        lr: 0.0001
      dropout: 0.0
      use_ema: true
      checkpointing: false
      num_blocks: 12
      dim: 768
      num_heads: 12
      sigma_data: 1.0
      use_fused_modulation: false
      tokenizer: {resolution: [1,2,2]}
      lr_scheduler:
        final_lr: 0.0001
      autoencoder_ckpt:
        snapshot_path: ${env.project_path}/checkpoints/sd_vae_ft_ema.pt
        convert_params_to_buffers: false

alphaflow-latentspace-sdvae-prextraction-folder:
  _inherit_: alphaflow-256x256-b256-ditb2-sdvae-base-folder
  pre_extract_latents: default
  overrides:
    pre_extract_latents:
      autoencoder_desc: sd_vae_fixed
      cmd:
        dst: ${env.folder_datasets_path}/${pre_extract_latents.new_dataset_name}/
        ignore: false
        ae_batch_gpu: 32
        no_preext_exp: alphaflow-256x256-b256-ditb2-sdvae-base-folder
        kwargs: {+save_metadata: true}
    dataset:
      data_type: image_latent
      src: ${env.folder_datasets_path}/${pre_extract_latents.new_dataset_name}/train/
      src_val: ${env.folder_datasets_path}/${pre_extract_latents.new_dataset_name}/val/
      +eval_stream:
        data_type: image
        src: ${env.folder_datasets_path}/imagenet/train/
    model:
      use_precomputed_latents: true

alphaflow-latentspace-B-2:
  _inherit_: alphaflow-latentspace-sdvae-prextraction-folder
  overrides:
    loss: {cfg_params: {omega: 1.0, t_min: 0.0, t_max: 1.0, kappa: 0.0}}
    model: {num_blocks: 12, dim: 768, num_heads: 12, label_dropout: 0.0, tokenizer: {resolution: [1,2,2]}}
    training: {max_steps: 400000, freqs: {snapshot: 100000}, freqs: {param_stats: null}}

alphaflow-latentspace-B-2-cfg-training:
  _inherit_: alphaflow-latentspace-sdvae-prextraction-folder
  overrides:
    loss: {cfg_params: {omega: 1.0, t_min: 0.0, t_max: 1.0, kappa: 0.5}}
    model: {num_blocks: 12, dim: 768, num_heads: 12, label_dropout: 0.1, tokenizer: {resolution: [1,2,2]}}
    training: {max_steps: 1200000, freqs: {snapshot: 100000}, freqs: {param_stats: null}}

# TEMF
#----------------------------------------------------------------------------

temf-latentspace-B-2:
  _inherit_: alphaflow-latentspace-B-2
  loss: temf
  overrides:
    loss:
      boundary_ratio: {scheduler: sigmoid, initial_value: 0.9, end_value: 0.1, change_init_steps: 0, change_end_steps: 400000, transition_progress: 0.6, gamma: 8.0}
      cfg_params:
        mix_schedule:
          mix_ratio: {scheduler: linear, initial_value: 0.3, end_value: 0.1, change_init_steps: 0, change_end_steps: 400000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}

temf-latentspace-B-2-cfg-training:
  _inherit_: alphaflow-latentspace-B-2-cfg-training
  loss: temf
  overrides:
    loss:
      boundary_ratio: {scheduler: sigmoid, initial_value: 0.9, end_value: 0.1, change_init_steps: 0, change_end_steps: 1200000, transition_progress: 0.6, gamma: 8.0}
      cfg_params:
        mix_schedule:
          mix_ratio: {scheduler: linear, initial_value: 0.3, end_value: 0.1, change_init_steps: 0, change_end_steps: 1200000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}

temf-ablation-static-boundary-B-2:
  _inherit_: temf-latentspace-B-2
  overrides:
    loss:
      boundary_ratio: {scheduler: constant, initial_value: 0.5}

temf-ablation-no-temporal-weight-B-2:
  _inherit_: temf-latentspace-B-2
  overrides:
    loss:
      temporal_equilibrium: {lambda1: 0.0, lambda2: 0.0, beta1: 1.0, delta_eps: 0.001, min_weight: ~, max_weight: ~, normalize: false, normalize_eps: 1.0e-6}

temf-extreme-fid-B-2:
  _inherit_: temf-latentspace-B-2
  overrides:
    sampling: {num_steps: 1, sigma_noise: 1.0, enable_trajectory_sampling: true, time_shifting: 0.85}
    loss:
      boundary_ratio: {scheduler: sigmoid, initial_value: 0.95, end_value: 0.05, change_init_steps: 0, change_end_steps: 400000, transition_progress: 0.6, gamma: 10.0}
      temporal_equilibrium: {lambda1: 1.5, lambda2: 1.25, beta1: 1.0, delta_eps: 0.001, min_weight: 0.35, max_weight: 3.0, normalize: true, normalize_eps: 1.0e-6}
      fid_tricks:
        use_temf_target: true
        boundary_loss_weight: 1.4
        trajectory_loss_weight: 1.1
        fm_weight: 1.0
        consistency_weight: {scheduler: linear, initial_value: 0.2, end_value: 1.25, change_init_steps: 0, change_end_steps: 400000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}
        add_objective_residual: 0.15
      cfg_params:
        mix_schedule:
          mix_ratio: {scheduler: linear, initial_value: 0.35, end_value: 0.08, change_init_steps: 0, change_end_steps: 400000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}

temf-extreme-fid-B-2-cfg-training:
  _inherit_: temf-latentspace-B-2-cfg-training
  overrides:
    sampling: {num_steps: 1, sigma_noise: 1.0, enable_trajectory_sampling: true, time_shifting: 0.85}
    loss:
      boundary_ratio: {scheduler: sigmoid, initial_value: 0.95, end_value: 0.05, change_init_steps: 0, change_end_steps: 1200000, transition_progress: 0.6, gamma: 10.0}
      temporal_equilibrium: {lambda1: 1.5, lambda2: 1.25, beta1: 1.0, delta_eps: 0.001, min_weight: 0.35, max_weight: 3.0, normalize: true, normalize_eps: 1.0e-6}
      fid_tricks:
        use_temf_target: true
        boundary_loss_weight: 1.4
        trajectory_loss_weight: 1.1
        fm_weight: 1.0
        consistency_weight: {scheduler: linear, initial_value: 0.2, end_value: 1.25, change_init_steps: 0, change_end_steps: 1200000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}
        add_objective_residual: 0.15
      cfg_params:
        mix_schedule:
          mix_ratio: {scheduler: linear, initial_value: 0.35, end_value: 0.08, change_init_steps: 0, change_end_steps: 1200000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}

alphaflow-latentspace-XL-2-cfg-training:
  _inherit_: alphaflow-latentspace-sdvae-prextraction-folder
  overrides:
    loss: {cfg_params: {omega: 1.0, t_min: 0.0, t_max: 1.0, kappa: 0.5}}
    model: {num_blocks: 28, dim: 1152, num_heads: 16, label_dropout: 0.1, tokenizer: {resolution: [1,2,2]}}
    training: {max_steps: 1200000, freqs: {snapshot: 100000}, freqs: {param_stats: null}}

alphaflow-latentspace-XL-2-plus-cfg-training:

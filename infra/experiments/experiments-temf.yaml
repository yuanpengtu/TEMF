      temporal_equilibrium: {lambda1: 1.5, lambda2: 1.25, beta1: 1.0, delta_eps: 0.001, min_weight: 0.35, max_weight: 3.0, normalize: true, normalize_eps: 1.0e-6}
      fid_tricks:
        use_temf_target: true
        boundary_loss_weight: 1.4
        trajectory_loss_weight: 1.1
        fm_weight: 1.0
        consistency_weight: {scheduler: linear, initial_value: 0.2, end_value: 1.25, change_init_steps: 0, change_end_steps: 1200000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}
        add_objective_residual: 0.15
      cfg_params:
        mix_schedule:
          mix_ratio: {scheduler: linear, initial_value: 0.35, end_value: 0.08, change_init_steps: 0, change_end_steps: 1200000, gamma: 1.0, clamp_value: 0.0, up_clamp_value: ~}

